schema_version: 1

context:
  name: reportportal-client
  version: "5.7.4"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name | replace('-', '_') }}-${{ version }}.tar.gz
  sha256: 8fbe83142433aabbc2c28618d00bc5f6cd30b39fce73a7afbe94da3f5c33b54c

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - importlib-metadata
    - pip
    - setuptools >=40.0
    - setuptools-scm
    - wheel
  run:
    - python >=${{ python_min }}
    - typing-extensions >=4.13.2,<=4.15.0
    - requests >=2.32.5,<=2.33.1
    - aiohttp >=3.13.4,<=3.13.5
    - certifi ==2026.2.25

tests:
  - python:
      imports:
        - reportportal_client
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - "*"

about:
  summary: Python client for Report Portal v5.
  license: Apache-2.0
  license_file: LICENSE.md
  homepage: https://github.com/reportportal/client-Python

extra:
  recipe-maintainers:
    - thewchan
